const GreyScale=0, RGBScale=1, YCbCrScale=2;

function readSOHForm(divIdURL, divIdSidecarURL, divIdLimit, divIdScale, divIdBoxes, divIdItems, divIdGroups, divIdImages){
	readSOHFormAsync(divIdURL, divIdSidecarURL, divIdLimit, divIdScale, divIdBoxes, divIdItems, divIdGroups, divIdImages);
	return false;
}

async function readSOHFormAsync(divIdURL, divIdSidecarURL, divIdLimit, divIdScale, divIdBoxes, divIdItems, divIdGroups, divIdImages){
	var url=document.getElementById(divIdURL).value;
	var fileInfo=await readSOHBoxDumpURL(url, parseInt(document.getElementById(divIdLimit).value), divIdBoxes, showBoxes);
	if (!fileInfo)
		return;
	let scale=document.getElementById(divIdScale).value;
	if(scale)
		scaleImageFactor=parseFloat(scale);
	fileInfo.brand=await readSOHFtypBoxURL(url, fileInfo);
	if (fileInfo.brand){
		if (isBrandPresent(fileInfo, 'miaf'))
			fileInfo.mediaHandler=await readSOHHdlrBox(url, fileInfo);
		showBoxes(fileInfo, divIdBoxes);
	}
	if (divIdGroups)
		fileInfo.groups=await readSOHGroupsDumpURL(url, fileInfo, divIdGroups, showGroups);
	if (divIdItems)
		fileInfo.items=await readSOHItemsDumpURL(url, document.getElementById(divIdSidecarURL).value, fileInfo, divIdItems, showItems);
	if (divIdImages)
		showSOHImagesItems(url, fileInfo, divIdImages);
	return fileInfo;
}


function dataViewToHexa(dataView, limit)
{
	if (!dataView)
		return "";
	var len=dataView.byteLength, s="", h;

	if (limit && len>limit) len=limit;
	for(var i=0; i<len; i++)
	{
		h=dataView.getUint8(i).toString(16).toUpperCase();
		s+=((h.length==1) ? "0"+h : h) +" ";
	}
	return s;
}

function dataViewToChar(dataView, limit)
{
	if (!dataView)
		return "";

	var len=dataView.byteLength, s="", c;

	if (limit && len>limit) len=limit;
	for(var i=0; i<len; i++) {
		if (dataView.getUint8(i)<32)
			c="·";
		else {
			c=String.fromCharCode(dataView.getUint8(i));
			if (c=='<')
				c="&lt;";
			else if (c=='&')
				c="&amp;";
		}
		s+=c;
	}
	return s;
}

function dataViewToDeci(dataView, limit)
{
	if (!dataView)
		return "";
	var len=dataView.byteLength, s="";

	if (limit && len>limit) len=limit;
	for(var i=0; i<len; i++)
		s+=dataView.getUint8(i).toString()+" ";

	return s;
}

async function showBoxes(fileInfo, divId) {
	var array=fileInfo.boxes, brand=fileInfo.brand, s="";
	if (brand) {
		s+="<H3>Brand information</H3>";
		s+="<i>Major grand</i>: <b>" + brand.majorBrand + "</b> version " + brand.minorVersion + "<br>";
		if (brand.compatibleBrands) {
			s+="<i>Compatible brands</i>:<br><ul>";
			for (var i=0; i<brand.compatibleBrands.length; i++) {
				s+="<li><b>"+brand.compatibleBrands[i]+"</b>";
				for (var j=0; j<brandSOHMeaning.length; j++) {
					if (brand.compatibleBrands[i]==brandSOHMeaning[j].brand) {
						s+=" ("+ brandSOHMeaning[j].meaning +")";
						break;
					}
				}
				s+="<br>";
			}
			s+="</ul>";
		}
	}
	if (fileInfo.mediaHandler) {
		s+="<H3>Media Handler</H3>";
		s+="<i>Media Handler</i>: <b>" + fileInfo.mediaHandler + "</b>";
		for (var j=0; j<mediaHandlerSOHMeaning.length; j++) {
			if (fileInfo.mediaHandler==mediaHandlerSOHMeaning[j].handler) {
				s+=" ("+ mediaHandlerSOHMeaning[j].meaning +")";
				break;
			}
		}
	}
	if (array) {
		s+="<H3>Boxes information</H3>";
		s+="<table border=1><tr><th>Size</th><th>Type</th><th>Data (String)</th><th>Data (Number)</th><th>Data (Hex)</th></tr>";
		for (var i=0; i<array.length; i++)
			s+="<tr><td>" + array[i].size + "</td><td>" + array[i].type + "</td><td>" + dataViewToChar(array[i].dataView) + "</td><td>" + dataViewToDeci(array[i].dataView) + "</td><td style='font-family: monospace;'>" + dataViewToHexa(array[i].dataView) + "</td></tr>";
		s+="</table>";
	}
	document.getElementById(divId).innerHTML=s;
}

function preparecanvasSOHImage(canvasId, width, height, scaleFactor) {

	if(!scaleFactor)
		scaleFactor=1;
	return "<canvas id=\""+canvasId+"temp\" width=\""+width+"px\" height=\""+height+"px\" style=\"display:none\"></canvas>"+
		"<canvas id=\""+canvasId+"\" width=\""+width*scaleFactor+"px\" height=\""+height*scaleFactor+"px\"></canvas>";
}

function showSOHImage(data, canvasId, width, height, scaleFactor) {

	var canvas_temp=document.getElementById(canvasId+"temp");
	var ctx_temp = canvas_temp.getContext('2d');
	ctx_temp.clearRect( 0, 0, ctx_temp.canvas.width, ctx_temp.canvas.height);
	var imgData=ctx_temp.createImageData(width, height);
	imgData.data.set(data);
	ctx_temp.putImageData(imgData, 0, 0);
	
	if(!scaleFactor)
		scaleFactor=1;
	
	var canvas = document.getElementById(canvasId);
	var ctx = canvas.getContext('2d');
	ctx.clearRect( 0, 0, ctx.canvas.width*scaleFactor, ctx.canvas.height*scaleFactor);
	//var imgData=ctx.createImageData(width*scaleFactor, height*scaleFactor);
	ctx.drawImage(canvas_temp, 0, 0, width*scaleFactor, height*scaleFactor);
}

async function getSOHImage(url, item, offsetMdat, iTile, jTile){

	if(!item)
		return null;
	if (item.tileWidth && item.tileHeight)
		return await getURLBuffer(url, offsetMdat+item.tiles[jTile*item.matrixWidth+iTile].offset, offsetMdat+item.tiles[jTile*item.matrixWidth+iTile].offset+item.tiles[jTile*item.matrixWidth+iTile].size-1);
	return await getURLBuffer(url, item.extents[0].extentOffset, item.extents[0].extentOffset+item.extents[0].extentLength-1);
}

// Image Item in UNCI
async function getAndshowSOHUnciImage(url, item, scaleFactor, offsetMdat, iTile, jTile)
{
	var arrayBuffer=null, itemType, uncompressProfile, height, width, canvasId;
	if (item.tileWidth && item.tileHeight) {
		itemType=item.itemTypeTile;
		uncompressProfile=item.uncompressProfileTile;
		width=item.tileWidth;
		height=item.tileHeight;
		canvasId=item.itemId + "_" + jTile + "_" + iTile;		
	}
	else {
		itemType=item.itemType;
		uncompressProfile=item.uncompressProfile;
		width=item.imageWidth;
		height=item.imageHeight;
		canvasId=item.itemId;
	}
	if(itemType!='unci' || uncompressProfile!="rgb3")   //RGB 24 bits packed {'rgb3', 3, [{4,7},{5,7},{6,7}], 0, 1}
		return;	
	arrayBuffer=await getSOHImage(url, item, offsetMdat, iTile, jTile);
	if(!arrayBuffer)
		return;
	
	var dataView=new DataView(arrayBuffer), data=[];

	for (var offset=0, j=0; j<height; j++) {
		for (var i=0; i<width; i++, offset+=3)
			data.push(dataView.getUint8(offset), dataView.getUint8(offset+1), dataView.getUint8(offset+2), 255);
	}
	showSOHImage(data, canvasId, width, height, scaleFactor);
	return;
}

// Image Item in H265/HVCC
function getAndConvertImageYUV2RGB(image){

	var h = image.get_height(), w=image.get_width();
	
	var canvas_temp = document.getElementById(image.decoder.canvasId+"temp");
	var ctx_temp = canvas_temp.getContext('2d');
	ctx_temp.clearRect( 0, 0, h, w);
	var imgData=ctx_temp.createImageData(w, h);
	var data = imgData.data;
	for (var i=0; i<w*h; i++) {
		data[i*4+3] = 255;
	}
	image.ImageData=imgData;
    image.display(image.ImageData, function(display_image_data) {
        ctx_temp.putImageData(display_image_data, 0, 0);
		if(!image.decoder.scaleFactor)
			image.decoder.scaleFactor=1;
	
		var canvas = document.getElementById(image.decoder.canvasId);
		var ctx = canvas.getContext('2d');
		ctx.clearRect( 0, 0, ctx.canvas.width*image.decoder.scaleFactor, ctx.canvas.height*image.decoder.scaleFactor);
		ctx.drawImage(canvas_temp, 0, 0, w*image.decoder.scaleFactor, h*image.decoder.scaleFactor);
    });
	return image.ImageData.data;
}

async function getAndshowSOHH265Image(url, item, scaleFactor, offsetMdat, iTile, jTile, itemsArray){
var arrayBuffer=null, itemType, height, width, canvasId, tileItem;

	if(!item)
		return null;
	if (item.tileWidth && item.tileHeight){
		itemType=item.itemTypeTile;
		width=item.tileWidth;
		height=item.tileHeight;
		canvasId=item.itemId + "_" + jTile + "_" + iTile;
		if(itemsArray && typeof item.tiles[jTile*item.matrixWidth+iTile].itemId !== "undefined"){
			var indexItem=getIndexSOHItemID(itemsArray, item.tiles[jTile*item.matrixWidth+iTile].itemId)
			if(indexItem!=-1)
				tileItem=itemsArray[indexItem];
			else
				tileItem=null;
		}
		else tileItem=null;
	}
	else{
		itemType=item.itemType;
		width=item.imageWidth;
		height=item.imageHeight;
		canvasId=item.itemId;
		tileItem=null;
	}
	if(itemType!='hvc1')
		return;
	arrayBuffer=await getSOHImage(url, item, offsetMdat, iTile, jTile);
	if(!arrayBuffer)
		return;

	var dataView=new DataView(arrayBuffer);

	var decoder = new libde265.Decoder(), error;
	decoder.canvasId=canvasId;
	decoder.scaleFactor=scaleFactor;
	decoder.set_image_callback(function(image) {
		decoder.data=getAndConvertImageYUV2RGB(image);
		image.free();
	});		
	var naluArrays= (item.naluArrays) ? item.naluArrays : (tileItem ? tileItem.naluArrays : null);
	if(naluArrays)
	{
		for (var i_array=0; i_array<naluArrays.length; i_array++)
		{
			for (var i_nalu_unit=0; i_nalu_unit<naluArrays[i_array].data.length; i_nalu_unit++)
			{
				error=decoder.push_NAL(naluArrays[i_array].data[i_nalu_unit]);
				if(error)
					console.log("error" + error);
			}
		}
	}
	var offset=0, data_length, data_pack, more;
	while(offset<dataView.byteLength)
	{
		data_length=dataView.getUint32(offset);
		data_pack=[];
		offset+=4;
		for (var z=0; z<data_length; z++) {
			data_pack[z]=dataView.getUint8(offset);
			offset++;
		}	
		error=decoder.push_NAL(data_pack);
		if(error)
			console.log("error" + error);
	}
	error=decoder.push_end_of_frame();
	if(error)
		console.log("error" + error);

	decoder.decode();	
	decoder.free();
	return;
}

// Image Item in J2K
function getPixelDataFromJ2KDecoded(frameInfo, decodedBuffer) {
    if(frameInfo.bitsPerSample > 8) {
    	if(frameInfo.isSigned) {
        	return new Int16Array(decodedBuffer.buffer, decodedBuffer.byteOffset, decodedBuffer.byteLength / 2);
    	} else {
        	return new Uint16Array(decodedBuffer.buffer, decodedBuffer.byteOffset, decodedBuffer.byteLength / 2);
      	}
    } else {
    	return decodedBuffer;
    }
}

function ycbcrToRgb(y, cb, cr) {
  const Y  = y;
  const Cb = cb - 128;
  const Cr = cr - 128;

  let r = Y + 1.402   * Cr;
  let g = Y - 0.34414 * Cb - 0.71414 * Cr;
  let b = Y + 1.772   * Cb;

  return [
    Math.min(255, Math.max(0, r)),
    Math.min(255, Math.max(0, g)),
    Math.min(255, Math.max(0, b))
  ];
}


async function getAndshowSOHJ2KImage(url, item, scaleFactor, offsetMdat, iTile, jTile)
{
	var arrayBuffer=null, itemType, uncompressProfile, height, width, canvasId, colorSpace=colorSpaceByDefault;

	if(!item)
		return null;
	if (item.tileWidth && item.tileHeight){
		itemType=item.itemTypeTile;
		width=item.tileWidth;
		height=item.tileHeight;
		canvasId=item.itemId + "_" + jTile + "_" + iTile;
		/*if(itemsArray && typeof item.tiles[jTile*item.matrixWidth+iTile].itemId !== "undefined"){
			var indexItem=getIndexSOHItemID(itemsArray, item.tiles[jTile*item.matrixWidth+iTile].itemId)
			if(indexItem!=-1)
				tileItem=itemsArray[indexItem];
			else
				tileItem=null;
		}
		else tileItem=null;*/
	}
	else{
		itemType=item.itemType;
		width=item.imageWidth;
		height=item.imageHeight;
		canvasId=item.itemId;
		/*tileItem=null;*/
	}
	if(itemType!='j2k1')
		return;
	arrayBuffer=await getSOHImage(url, item, offsetMdat, iTile, jTile);
	if(!arrayBuffer)
		return;

	var dataArray=new Uint8Array(arrayBuffer);
	
	// JS / WASM promises resolve the library and creates a new decoder
	//const openjpegjs = await OpenJPEGWASM();
	const openjpegjs = await OpenJPEGJS();
	const J2KDecoder = new openjpegjs.J2KDecoder();
	// Decode the dataArray
	const encodedBuffer = J2KDecoder.getEncodedBuffer(dataArray.length);
	encodedBuffer.set(dataArray);
	J2KDecoder.decode();
	// Get the decoded array
	const decodedBuffer = J2KDecoder.getDecodedBuffer();
	const frameInfo = J2KDecoder.getFrameInfo(); // width/height will be wrong if using decodeSubResolution
	// const interleaveMode = 2;

    // Show the image in the canvas
	if(decodedBuffer) {	
		const image=getPixelDataFromJ2KDecoded(frameInfo, decodedBuffer);
		if(image){
			var RGB, grey_value, data=[], bytesPerSample = (frameInfo.bitsPerSample <= 8) ? 1 : 2, 	pixelsPerChannel = frameInfo.width * frameInfo.height* bytesPerSample, shift=(frameInfo.bitsPerSample > 8) ? 8 : 0, inOffset=0;
			for(var y=0; y < frameInfo.height; y++) {
				for (var x = 0; x < frameInfo.width; x++) {
					if (frameInfo.componentCount==1 || colorSpace==GreyScale){
						grey_value=image[inOffset] >> shift;
						data.push(grey_value, grey_value, grey_value, 255);
						if(frameInfo.componentCount==1)
							inOffset++;
						else
							inOffset+=3;
					}
					else if (frameInfo.componentCount==3 && colorSpace==RGBScale)
						data.push(image[inOffset++] >> shift, image[inOffset++] >> shift, image[inOffset++] >> shift, 255);
					else if (frameInfo.componentCount==3 && colorSpace==YCbCrScale) {
						RGB=ycbcrToRgb(image[inOffset++] >> shift, image[inOffset++] >> shift, image[inOffset++] >> shift);
						data.push(RGB[0], RGB[1], RGB[2], 255); 
					}
				}
			}
			showSOHImage(data, canvasId, frameInfo.width, frameInfo.height, scaleFactor);	
		}
	}
    J2KDecoder.delete();
}


function isSOHImageTypeSupported(itemType, uncompressProfile)
{
	//if(itemType=='avc1' || itemType=='jpeg')  // codes supported for Still Imagery	
	if(itemType=='j2k1' || (itemType=='unci' && uncompressProfile=="rgb3") || itemType=='hvc1')
		return true;
	return false;	
}

async function showSOHImagesItems(url, fileInfo, divId) {
	var item, s="", arrayBuffer;

	var mdat=getIndexSOHBoxType(fileInfo.boxes, "mdat");
	if (mdat==-1)
		return;
	var offsetMdat=fileInfo.boxes[mdat].start;

	var s="<H3>Item images</H3>";
	for (var a=0; a<fileInfo.items.length; a++) {
		item=fileInfo.items[a];
		if (!item.isTile) {
			if (item.tileWidth && item.tileHeight) { //is a grid or tili
				s+="<table>";
				for (var j=0; j<item.matrixHeight; j++) {
					s+="<tr>";
					for (var i=0; i<item.matrixWidth; i++) {
						if(isSOHImageTypeSupported(item.itemTypeTile, item.uncompressProfileTile))
						{
							s+="<td>Tile (" + j + "," + i + ")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"+
								preparecanvasSOHImage(item.itemId + "_" + j + "_" + i, item.tileWidth, item.tileHeight, scaleImageFactor)+
								"</td>";
						}
					}
					s+="</tr>";
				}
				s+="</table>";
			} else {
				if(isSOHImageTypeSupported(item.itemType, item.uncompressProfile))
					s+=preparecanvasSOHImage(item.itemId,item.imageWidth, item.imageHeight, scaleImageFactor);
			}
		}
	}
	document.getElementById(divId).innerHTML=s;
	for (var a=0; a<fileInfo.items.length; a++) {
		item=fileInfo.items[a];
		if (!item.isTile) {
			if (item.tileWidth && item.tileHeight) { //is a grid or tili
				for (var j=0; j<item.matrixHeight; j++) {
					for (var i=0; i<item.matrixWidth; i++) {
						if(item.itemTypeTile=='unci' && item.uncompressProfileTile=="rgb3")
							getAndshowSOHUnciImage(url, item, scaleImageFactor, offsetMdat, i, j);
						else if(item.itemTypeTile=='hvc1')	
							getAndshowSOHH265Image(url, item, scaleImageFactor, offsetMdat, i, j, fileInfo.items);
						else if(item.itemTypeTile=='j2k1')	
							getAndshowSOHJ2KImage(url, item, scaleImageFactor, offsetMdat, i, j);
					}
				}
			} else {
				if(item.itemType=='unci' && item.uncompressProfile=="rgb3")
					getAndshowSOHUnciImage(url, item, scaleImageFactor);
				else if(item.itemType=='hvc1')	
					getAndshowSOHH265Image(url, item, scaleImageFactor);		
				else if(item.itemType=='j2k1')	
					getAndshowSOHJ2KImage(url, item, scaleImageFactor);			
			}
		}
	}
}

function PopulateInputFromSelect(event, heifURLId, sidecarURLId) {
	event.preventDefault(); // We don't want to submit this form

	var obj=JSON.parse(document.getElementById(heifURLId+"Select").value);
	document.getElementById(heifURLId).value=obj[heifURLId] ? obj[heifURLId] : "";
	if (sidecarURLId)
		document.getElementById(sidecarURLId).value=obj[sidecarURLId] ? obj[sidecarURLId] : "";
	if (document.getElementById(heifURLId+"Button"))
		document.getElementById(heifURLId+"Button").click();
}
	</script>
</head>
